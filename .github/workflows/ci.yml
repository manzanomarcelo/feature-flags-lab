name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  node-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Check package scripts
        run: npm run